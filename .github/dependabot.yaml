version: 2
updates:
  - package-ecosystem: mix
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "rhblind"
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "rhblind"
